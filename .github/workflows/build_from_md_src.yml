name: build_from_md_src

on:
  repository_dispatch:
    types: [content_update]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout note repo
        uses: actions/checkout@v4
        with:
          repository: joyanhui/note
          token: ${{ secrets.TOKEN_GH }}
          path: note-repo

      - name: Checkout theme repo
        uses: actions/checkout@v4
        with:
          path: theme-repo

      - name: Merge theme into note repo
        run: |
          cp -r theme-repo/layouts/* note-repo/dev.leiyanhui.com/layouts/
          cp -r theme-repo/assets/* note-repo/dev.leiyanhui.com/assets/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.21.0'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Build with Hugo
        working-directory: note-repo/dev.leiyanhui.com
        run: hugo --minify --gc

      - name: Deploy to gh-pages
        working-directory: note-repo/dev.leiyanhui.com
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp assets/favicon.ico public/favicon.ico
          cd public
          rm -rf .git*
          echo "dev.leiyanhui.com" > CNAME
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Auto deploy from $GITHUB_SHA"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/joyanhui/dev.leiyanhui.com-page.git
          git push origin master:gh-pages -f -q
