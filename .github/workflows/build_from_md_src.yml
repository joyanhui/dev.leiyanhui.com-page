name: build_from_md_src

on:
  repository_dispatch:
    types: [content_update]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout note repo (content only)
        uses: actions/checkout@v4
        with:
          repository: joyanhui/note
          token: ${{ secrets.TOKEN_GH }}
          path: note-repo

      - name: Checkout page repo (theme, config, assets)
        uses: actions/checkout@v4
        with:
          path: page-repo

      - name: Merge content from note repo
        run: |
          rm -rf page-repo/content
          cp -r note-repo/dev.leiyanhui.com/content page-repo/content

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '^1.21.0'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.161.1'
          extended: true

      - name: Build with Hugo
        working-directory: page-repo
        run: hugo --minify --gc

      - name: Deploy to gh-pages
        working-directory: page-repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          rm -rf .git*
          echo "dev.leiyanhui.com" > CNAME
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "Auto deploy from $GITHUB_SHA"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/joyanhui/dev.leiyanhui.com-page.git
          git push origin master:gh-pages -f -q