<header class="top-header mobile-only">
    <button class="hamburger hamburger--spin" type="button" id="toggle-drawer" aria-label="{{ T `toggleMenu` }}">
        <span class="hamburger-box">
            <span class="hamburger-inner"></span>
        </span>
    </button>

    <a href="{{ .Site.BaseURL | relLangURL }}" class="header-title">{{ .Site.Title }}</a>

    <div class="header-right">
        {{ if (default false .Site.Params.colorScheme.toggle) }}
            <button id="dark-mode-toggle-header" class="dark-mode-toggle" aria-label="{{ T `darkMode` }}">
                {{ partial "helper/icon" "sun" }}
                {{ partial "helper/icon" "moon" }}
            </button>
        {{ end }}
    </div>
</header>
