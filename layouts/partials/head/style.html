{{ $sass := resources.Get "scss/style.scss" }}
{{ $style := $sass | toCSS | minify | resources.Fingerprint "sha256" }}
<link rel="stylesheet" href="{{ $style.RelPermalink }}">

{{ $customScss := resources.Get "scss/custom.scss" }}
{{ if $customScss }}
    {{ $customStyle := $customScss | toCSS | minify | resources.Fingerprint "sha256" }}
    <link rel="stylesheet" href="{{ $customStyle.RelPermalink }}">
{{ end }}
